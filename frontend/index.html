<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LexAI — интеллектуальный переводчик с анализом лексики на основе искусственного интеллекта. Поддержка русского, английского и казахского языков.">
  <meta name="theme-color" content="#667eea">

  <title>LexAI — переводчик и анализ лексики</title>

  <!-- Preconnect для ускорения загрузки шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase конфигурация -->
  <script type="module" src="js/firebase-config.js"></script>
</head>
<body>

  <!-- Ссылка для быстрого перехода к контенту (доступность) -->
  <a href="#main-content" class="skip-link">Перейти к содержимому</a>

  <header>
    <div class="logo" aria-label="LexAI — главная">LexAI</div>
    <nav aria-label="Основная навигация">
      <a href="index.html" aria-current="page">Переводчик</a>
      <a href="about.html">О проекте</a>
    </nav>
    <div class="header-right" style="margin-left: auto;">
      <div id="userInfo" class="user-info hidden">
        <button id="userButton" class="user-button" aria-label="Меню пользователя">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span id="userName">Пользователь</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </button>
        <div id="userDropdown" class="user-dropdown hidden">
          <button id="logoutBtn" class="dropdown-item">Выйти</button>
        </div>
      </div>
      <button id="historyToggle" aria-label="История переводов" title="История переводов">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
      </button>
      <a href="login.html" id="loginLink" class="login-link">Войти</a>
      <button id="themeToggle" aria-label="Переключить тему" title="Переключить тему">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="main-content">
    <h1>Интеллектуальный переводчик</h1>
    <p class="subtitle">Перевод и анализ текста на основе искусственного интеллекта</p>

    <div class="translator" role="region" aria-label="Переводчик">

      <!-- Левая панель — исходный текст -->
      <div class="box">
        <label class="box-label" for="langFrom">Исходный язык</label>
        <select id="langFrom" name="langFrom">
          <option value="русский">Русский</option>
          <option value="английский">Английский</option>
          <option value="казахский">Казахский</option>
        </select>

        <label class="sr-only" for="inputText">Текст для перевода</label>
        <textarea
          id="inputText"
          name="inputText"
          placeholder="Введите текст..."
          aria-describedby="inputHint"
          spellcheck="true"
          autocomplete="off"
        ></textarea>
        <span id="inputHint" class="sr-only">Введите текст, который нужно перевести</span>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="button-group">
        <button
          id="swapBtn"
          aria-label="Поменять языки местами"
          title="Поменять языки"
          type="button"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m16 3 4 4-4 4"/>
            <path d="M20 7H4"/>
            <path d="m8 21-4-4 4-4"/>
            <path d="M4 17h16"/>
          </svg>
        </button>

        <button
          id="translateBtn"
          aria-label="Перевести текст"
          title="Перевести"
          type="button"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" x2="22" y1="12" y2="12"/>
            <path d="m12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Правая панель — результат перевода -->
      <div class="box">
        <label class="box-label" for="langTo">Перевод</label>
        <select id="langTo" name="langTo">
          <option value="английский">Английский</option>
          <option value="русский">Русский</option>
          <option value="казахский">Казахский</option>
        </select>

        <label class="sr-only" for="outputText">Результат перевода</label>
        <textarea
          id="outputText"
          name="outputText"
          placeholder="Перевод появится здесь..."
          readonly
          aria-live="polite"
          aria-atomic="true"
          aria-label="Результат перевода"
        ></textarea>
        <button id="copyOutputBtn" aria-label="Копировать перевод" title="Копировать">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Блок анализа лексики — скрыт до первого перевода -->
    <section
      id="analysis"
      class="analysis hidden"
      aria-label="Анализ лексики"
      aria-live="polite"
    >
      <h2>Анализ лексики</h2>
      <div id="analysisResult"></div>
    </section>
  </main>

  <!-- Боковое окно истории -->
  <aside id="historySidebar" class="history-sidebar" aria-label="История переводов">
    <div class="history-header">
      <h3>История переводов</h3>
    </div>
    <div id="historyList" class="history-list"></div>
    <div class="history-footer">
      <button id="clearHistory" aria-label="Очистить историю">Очистить историю</button>
    </div>
  </aside>

  <!-- defer: скрипт загружается после парсинга HTML, не блокируя рендер -->
  <script src="js/app.js" defer></script>
</body>
</html>
